<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sign Up | Unity Volunteer</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            background-color: #1C2E3B;
            color: white;
            margin: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
        }

        .signup-container {
            background-color: #2D4560;
            padding: 40px;
            border-radius: 8px;
            box-shadow: 0 4px 8px rgba(0, 0, 0, 0.2);
            text-align: center;
            width: 400px;
        }

        .logo {
            width: 60px;
            margin-bottom: 20px;
        }

        .signup-form {
            display: flex;
            flex-direction: column;
        }

        .signup-form .form-row {
            display: flex;
            justify-content: space-between;
        }

        .signup-form .form-column {
            flex: 0 0 48%;
            display: flex;
            flex-direction: column;
        }

        .signup-form .full-width {
            flex: 0 0 100%;
        }

        .signup-form label {
            margin-bottom: 5px;
            text-align: left;
            font-weight: bold;
        }

        .signup-form input,
        .signup-form select {
            margin-bottom: 15px;
            padding: 10px;
            border: none;
            border-radius: 4px;
            background-color: #364a5e;
            color: white;
        }

        .signup-form button {
            padding: 10px;
            background-color: #F7C948;
            border: none;
            border-radius: 4px;
            color: #1C2E3B;
            font-size: 16px;
            cursor: pointer;
        }

        .signup-form button:hover {
            background-color: #e0b83a;
        }

        .signup-form input::placeholder {
            color: #ccc;
        }

        .signup-form input:focus,
        .signup-form select:focus {
            outline: none;
            background-color: #2a3e52;
        }

        .signup-container p {
            margin-top: 20px;
        }

        .signup-container a {
            color: #F7C948;
            text-decoration: none;
        }

        .signup-container a:hover {
            text-decoration: underline;
        }

        .message {
            margin-top: 20px;
            font-weight: bold;
        }
    </style>
</head>

<body>
    <div class="signup-container">
        <img src="/images/logo.png" alt="Unity Volunteer Logo" class="logo">
        <form id="signupForm" class="signup-form">
            <div class="form-row">
                <div class="form-column">
                    <label for="given-name">Given Name*</label>
                    <input type="text" id="given-name" name="given_name" required>
                </div>
                <div class="form-column">
                    <label for="last-name">Last Name*</label>
                    <input type="text" id="last-name" name="last_name" required>
                </div>
            </div>

            <div class="form-row">
                <div class="form-column">
                    <label for="username">Username*</label>
                    <input type="text" id="username" name="username" required>
                </div>
                <div class="form-column">
                    <label for="phone-number">Phone Number*</label>
                    <input type="tel" id="phone-number" name="phone_number" required>
                </div>
            </div>

            <div class="form-row">
                <div class="form-column">
                    <label for="email">Email*</label>
                    <input type="email" id="email" name="email" required>
                </div>
                <div class="form-column">
                    <label for="password">Password*</label>
                    <input type="password" id="password" name="password" required>
                </div>
            </div>

            <div class="form-row">
                <div class="form-column full-width">
                    <label for="interests">Areas of Interest</label>
                    <input type="text" id="interests" name="interests"
                        placeholder="e.g., Animal Welfare, Arts & Culture">
                </div>
            </div>

            <button type="submit">Sign Up</button>
        </form>

        <p>Already have an account? <a href="/auth/sign-in">Log In</a></p>
        <p id="signupMessage" class="message"></p>
    </div>
    <script>
        document.getElementById('signupForm').addEventListener('submit', function (e) {
            e.preventDefault();
            const formData = new URLSearchParams(new FormData(this));
            fetch('/auth/signup', {
                method: 'POST',
                body: formData,
                headers: {
                    'Content-Type': 'application/x-www-form-urlencoded'
                }
            })
                .then(response => response.json())
                .then(data => {
                    const messageElement = document.getElementById('signupMessage');
                    if (data.success) {
                        messageElement.textContent = data.message;
                        messageElement.style.color = 'green';
                        setTimeout(() => {
                            window.location.href = '/auth/sign-in';
                        }, 2000);
                    } else {
                        messageElement.textContent = data.message;
                        messageElement.style.color = 'red';
                    }
                });
        });
    </script>
</body>

</html>
