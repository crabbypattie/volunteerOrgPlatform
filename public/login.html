<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - Unity Volunteer</title>
    <link rel="stylesheet" href="/stylesheets/loginStyle.css">
</head>
<body>
    <div class="login-container">
        <div class="login-box">
            <img src="/images/logo.png" alt="Unity Volunteer Logo" class="logo">
            <h1>Unity Volunteer</h1>
            <p>A place to connect volunteers and make a difference</p>
            <div class="social-login">
                <a href="/auth/google" class="google-login-button">
                    Continue with Google
                </a>
            </div>
            <div class="divider">
                <hr class="divider-line">
                <span>or</span>
                <hr class="divider-line">
            </div>
            <form id="signinForm" class="login-form">
                <div class="input-group">
                    <label for="email">Email</label>
                    <input type="email" id="email" name="email" required>
                </div>
                <div class="input-group">
                    <label for="password">Password</label>
                    <input type="password" id="password" name="password" required>
                </div>
                <div class="input-group">
                    <button type="submit" class="login-btn">Login</button>
                </div>
                <div class="forgot-password">
                    <a href="#">Forgot password?</a>
                </div>
            </form>
            <div class="signup-link">
                <p>Don't have an account? <a href="sign-up">Sign up with email</a></p>
            </div>
            <p id="signinMessage" class="message"></p>
        </div>
    </div>

    <script>
        document.getElementById('signinForm').addEventListener('submit', function (e) {
            e.preventDefault();
            const formData = new URLSearchParams(new FormData(this));
            fetch('/auth/signin', {
                method: 'POST',
                body: formData,
                headers: {
                    'Content-Type': 'application/x-www-form-urlencoded'
                }
            })
            .then(response => response.json())
            .then(data => {
                const messageElement = document.getElementById('signinMessage');
                if (data.success) {
                    messageElement.textContent = 'Login successful. Redirecting...';
                    messageElement.style.color = 'green';
                    localStorage.setItem('username', data.user.username);
                    localStorage.setItem('user_id', data.user.user_id);
                    window.location.href = '/find/browse?username=' + data.user.username;
                } else {
                    messageElement.textContent = data.message;
                    messageElement.style.color = 'red';
                }
            })
            .catch(error => {
                console.error('Error:', error);
                document.getElementById('signinMessage').textContent = 'An error occurred. Please try again.';
                document.getElementById('signinMessage').style.color = 'red';
            });
        });
    </script>
</body>
</html>
