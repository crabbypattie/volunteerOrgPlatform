<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Reset Password | Unity Volunteer</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            background-color: #1C2E3B;
            color: white;
            margin: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
        }

        .reset-container {
            background-color: #2D4560;
            padding: 40px;
            border-radius: 8px;
            box-shadow: 0 4px 8px rgba(0, 0, 0, 0.2);
            text-align: center;
            width: 400px;
        }

        .logo {
            width: 60px;
            margin-bottom: 20px;
        }

        .reset-form {
            display: flex;
            flex-direction: column;
        }

        .reset-form .form-row {
            display: flex;
            flex-direction: column;
            margin-bottom: 15px;
        }

        .reset-form label {
            margin-bottom: 5px;
            text-align: left;
            font-weight: bold;
        }

        .reset-form input {
            padding: 10px;
            border: none;
            border-radius: 4px;
            background-color: #364a5e;
            color: white;
        }

        .reset-form button {
            padding: 10px;
            background-color: #F7C948;
            border: none;
            border-radius: 4px;
            color: #1C2E3B;
            font-size: 16px;
            cursor: pointer;
            margin-top: 15px;
        }

        .reset-form button:hover {
            background-color: #e0b83a;
        }

        .reset-form input::placeholder {
            color: #ccc;
        }

        .reset-form input:focus {
            outline: none;
            background-color: #2a3e52;
        }

        .reset-container p {
            margin-top: 20px;
        }

        .reset-container a {
            color: #F7C948;
            text-decoration: none;
        }

        .reset-container a:hover {
            text-decoration: underline;
        }

    </style>
</head>
<body>
    <div class="reset-container">
        <img src="images/logo.png" alt="Unity Volunteer Logo" class="logo">
        <h2>Reset Your Password</h2>
        <p>Please enter your email address below. A verification code will be sent to your email to help you reset your password.</p>
        <form action="/reset-password" method="POST" class="reset-form">
            <div class="form-row">
                <label for="email">Email address*</label>
                <input type="email" id="email" name="email" placeholder="Enter your email" required>
            </div>
            <button type="submit">Send</button>
        </form>
    </div>
</body>
</html>
